<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealSara — Live</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Familjen+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#ffffff;--s:#ffffff;--sh:#f7f9f9;--el:#f7f9f9;--el2:#eff3f4;
    --br:#eff3f4;--br2:#e6ecf0;
    --t1:#0f1419;--t2:#536471;--t3:#8b98a5;
    --ac:#1d9bf0;--ach:#1a8cd8;--acd:rgba(29,155,240,.1);
    --lk:#f91880;--lkd:rgba(249,24,128,.1);
    --gn:#00ba7c;--gd:#ff9a00;--or:#ff6b00;
    --r:9999px;
    font-family:'Familjen Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  body{background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden;touch-action:pan-y;} html{background:#ffffff;}
  button,input,textarea,select{font-family:inherit;}
  ::-webkit-scrollbar{width:3px;height:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#cfd9de;border-radius:2px;}
  .no-scroll::-webkit-scrollbar{display:none;}
  .no-scroll{scrollbar-width:none;}

  .root{display:flex;max-width:1265px;margin:0 auto;min-height:100dvh;}
  .left{width:275px;position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;padding:0 12px;flex-shrink:0;background:#fff;}
  .feed{flex:1;max-width:600px;border-left:1px solid #eff3f4;border-right:1px solid #eff3f4;min-height:100dvh;background:#fff;}
  .right{width:350px;position:sticky;top:0;height:100dvh;padding:8px 16px;overflow-y:auto;flex-shrink:0;scrollbar-width:none;background:#fff;}

  .nav-logo{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;margin:4px 0;}
  .nav-logo:hover,.nav-item:hover{background:rgba(0,0,0,.07);}
  .nav-item{display:flex;align-items:center;gap:20px;padding:12px;border-radius:var(--r);cursor:pointer;transition:background .15s;color:var(--t1);border:none;background:transparent;width:100%;}
  .nav-item .ni{width:26px;height:26px;flex-shrink:0;}
  .nav-item .nl{font-size:20px;font-weight:400;}
  .nav-item.on .nl{font-weight:700;} .nav-item.on{background:rgba(0,0,0,.04);}
  .nav-badge{position:absolute;top:-3px;right:-3px;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:1px 4px;border-radius:var(--r);min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
  .niw{position:relative;}
  .sell-btn{background:#0f1419;color:#fff;border:none;border-radius:var(--r);font-size:17px;font-weight:700;padding:14px 24px;cursor:pointer;transition:background .15s;width:100%;margin-bottom:12px;}
  .sell-btn:hover{background:#272c30;}
  .acct-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;transition:background .15s;margin-bottom:12px;justify-content:space-between;border:none;background:transparent;width:100%;color:var(--t1);}
  .acct-row:hover{background:rgba(0,0,0,.06);}
  .av{width:40px;height:40px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;}
  .av-sm{width:32px;height:32px;font-size:13px;}
  .av-lg{width:48px;height:48px;font-size:18px;}
  .av-xl{width:80px;height:80px;font-size:28px;border:3px solid var(--bg);}

  .sth{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--br);}
  .sth-inner{padding:0 16px;height:53px;display:flex;align-items:center;gap:12px;}

  .tabs{display:flex;border-bottom:1px solid var(--br);}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;font-size:15px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;background:transparent;border-left:none;border-right:none;border-top:none;transition:all .15s;color:var(--t1);}
  .tab:hover{background:rgba(0,0,0,.03);}
  .tab.on{color:var(--t1);border-bottom-color:var(--ac);font-weight:700;}

  .pills{display:flex;overflow-x:auto;padding:8px 0 0;scrollbar-width:none;}
  .pills::-webkit-scrollbar{display:none;}
  .pill{flex-shrink:0;padding:6px 16px;margin:0 2px;border-radius:var(--r);border:1px solid var(--br);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;background:transparent;color:var(--t1);}
  .pill.on{border-color:var(--ac);background:var(--acd);color:var(--ac);}
  .pill:hover{background:rgba(0,0,0,.04);}

  .post{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--br);transition:background .15s;cursor:pointer;}
  .post:hover{background:#f7f9f9;}
  .pbody{flex:1;min-width:0;}
  .phdr{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap;}
  .pname{font-weight:700;font-size:15px;}
  .phandle,.ptime,.pdot{font-size:15px;color:var(--t2);}
  .ptitle{font-size:15px;font-weight:700;margin-bottom:4px;}
  .pdesc{font-size:15px;color:var(--t1);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .ptags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .tg{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:var(--r);font-size:13px;font-weight:600;}
  .tp{background:var(--acd);color:var(--ac);}
  .tl{background:rgba(83,100,113,.2);color:var(--t2);}
  .tc{background:rgba(83,100,113,.15);color:var(--t2);font-size:12px;}
  .tm{background:rgba(255,212,0,.15);color:var(--gd);font-size:10px;font-weight:800;padding:2px 8px;margin-left:auto;}
  .pimg{border-radius:14px;overflow:hidden;border:1px solid #eff3f4;margin-bottom:10px;}
  .pimg img{width:100%;height:220px;object-fit:cover;display:block;}
  .pimg2{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
  .pimg2 img{width:100%;height:160px;object-fit:cover;display:block;}

  .acts{display:flex;align-items:center;gap:2px;margin-top:4px;}
  .act{display:flex;align-items:center;gap:6px;padding:8px;border-radius:var(--r);font-size:13px;color:var(--t2);transition:all .15s;border:none;background:transparent;cursor:pointer;min-width:40px;}
  .act:hover.ac{background:var(--acd);color:var(--ac);}
  .act:hover.al{background:var(--lkd);color:var(--lk);}
  .act:hover.ag{background:rgba(0,186,124,.12);color:var(--gn);}
  .act.liked{color:var(--lk);}
  .act.saved{color:var(--ac);}

  .compose{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--br);}
  .compose-box{flex:1;padding:10px 16px;border-radius:var(--r);font-size:17px;color:var(--t3);border:1px solid var(--br);cursor:pointer;transition:border-color .15s;background:#f7f9f9;}
  .compose-box:hover{border-color:var(--ac);}

  .btn-p{background:#0f1419;color:#fff;border:none;border-radius:var(--r);font-weight:700;font-size:15px;padding:10px 24px;cursor:pointer;transition:background .15s;}
  .btn-p:hover{background:#272c30;}
  .btn-a{background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-weight:700;font-size:15px;padding:10px 24px;cursor:pointer;transition:background .15s;}
  .btn-a:hover{background:var(--ach);}
  .btn-o{background:transparent;color:var(--t1);border:1px solid var(--br);border-radius:var(--r);font-weight:700;font-size:15px;padding:10px 24px;cursor:pointer;transition:all .15s;}
  .btn-o:hover{background:rgba(0,0,0,.04);}

  .inp{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #cfd9de;background:#fff;color:var(--t1);font-size:15px;outline:none;transition:border-color .15s;}
  .inp:focus{border-color:var(--ac);}
  .inp::placeholder{color:var(--t3);}
  .lbl{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px;}

  .widget{background:#f7f9f9;border-radius:16px;overflow:hidden;margin-bottom:16px;border:1px solid var(--br);}
  .wtitle{font-size:20px;font-weight:800;padding:14px 16px 6px;color:var(--t1);}
  .wrow{display:flex;align-items:center;padding:11px 16px;gap:10px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(0,0,0,.03);}
  .wrow:hover{background:rgba(0,0,0,.04);}
  .wrow:last-child{border-bottom:none;}

  @keyframes grad{0%,100%{background:linear-gradient(135deg,#ff6b00,#ff0080,#7c3aed);}33%{background:linear-gradient(135deg,#f59e0b,#ef4444,#7c3aed);}66%{background:linear-gradient(135deg,#10b981,#3b82f6,#8b5cf6);}}
  @keyframes shim{0%{transform:translateX(-100%);}100%{transform:translateX(220%);}}
  @keyframes float{from{transform:translateY(0) rotate(0deg);}to{transform:translateY(-9px) rotate(18deg);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  @keyframes slideDown{from{transform:translateY(0);}to{transform:translateY(100%);}}
  @keyframes hb{0%{transform:scale(0) rotate(-15deg);opacity:0;}30%{transform:scale(1.4) rotate(5deg);opacity:1;}70%{transform:scale(1.1) rotate(-2deg);opacity:1;}100%{transform:scale(0);opacity:0;}}
  @keyframes likeScale{0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
  .like-pop{animation:likeScale .28s cubic-bezier(.17,.89,.32,1.49);}
  /* Search bar top */
  .top-search{display:flex;align-items:center;gap:10px;background:#f7f9f9;border:1px solid transparent;border-radius:var(--r);padding:10px 16px;transition:border-color .15s;cursor:pointer;margin:8px 12px;}
  .top-search:hover{border-color:var(--ac);}
  /* Profile pic upload overlay */
  .pic-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;cursor:pointer;}
  .pic-wrap:hover .pic-overlay{opacity:1;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

  .comp-banner{cursor:pointer;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.08);animation:grad 5.4s infinite;}
  .shim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.14) 50%,transparent 60%);animation:shim 2.4s infinite;}
  .fstar{position:absolute;pointer-events:none;animation:float 2.2s ease-in-out infinite alternate;opacity:.22;}
  .comp-in{padding:14px 16px 13px;position:relative;z-index:1;}

  /* Instagram-style reels */
  .reels-root{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;touch-action:pan-y;}
  .reel-container{position:relative;flex:1;overflow:hidden;}
  .reel-track{position:absolute;top:0;left:0;right:0;will-change:transform;transition:transform 0s;}
  .reel-track.animating{transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}
  .reel-slide{height:100dvh;position:relative;overflow:hidden;flex-shrink:0;}
  .reel-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.25) 0%,transparent 30%,transparent 55%,rgba(0,0,0,.75) 100%);pointer-events:none;}
  .reel-right{position:absolute;right:10px;bottom:90px;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:10;}
  .reel-btn{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.4);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;transition:transform .1s;}
  .reel-btn:active{transform:scale(.9);}
  .reel-bottom{position:absolute;left:12px;right:72px;bottom:12px;z-index:10;}
  .hb{animation:hb .7s cubic-bezier(.17,.89,.32,1.49) forwards;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
  .panel{width:100%;max-width:520px;background:#111;border-top-left-radius:24px;border-top-right-radius:24px;overflow:hidden;animation:slideUp .28s cubic-bezier(.32,.72,0,1) forwards;max-height:85dvh;display:flex;flex-direction:column;}
  .panel-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:none;}

  /* Share modal */
  .share-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
  .share-panel{width:100%;max-width:520px;background:#1a1a1a;border-top-left-radius:24px;border-top-right-radius:24px;padding:16px;animation:slideUp .28s cubic-bezier(.32,.72,0,1) forwards;}
  .share-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;cursor:pointer;border:none;background:transparent;color:#fff;}
  .share-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;}

  /* Plus menu - bottom sheet, centered */
  .plus-menu-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;}
  .plus-menu{width:100%;max-width:480px;z-index:151;background:#fff;border-top-left-radius:24px;border-top-right-radius:24px;padding:8px 8px 24px;box-shadow:0 -4px 40px rgba(0,0,0,.18);animation:slideUp .25s cubic-bezier(.32,.72,0,1);}
  .plus-menu-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;cursor:pointer;transition:background .15s;border:none;background:transparent;width:100%;text-align:left;}
  .plus-menu-item:hover{background:#f7f9f9;}
  .plus-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}

  .msg-me{background:var(--ac);color:#fff;border-radius:18px;border-bottom-right-radius:4px;margin-left:auto;}
  .msg-them{background:#f7f9f9;color:var(--t1);border:1px solid #eff3f4;border-radius:18px;border-bottom-left-radius:4px;}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--br);background:#fff;}
  .stat-cell{padding:16px;text-align:center;border-right:1px solid var(--br);}
  .stat-cell:last-child{border-right:none;}

  .prof-banner{height:130px;background:linear-gradient(135deg,#1d9bf0,#0d47a1);}

  .inb-row{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--br);cursor:pointer;transition:background .15s;align-items:center;}
  .inb-row:hover{background:#f7f9f9;}

  .adm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .adm-card{padding:16px;border-radius:16px;background:#fff;border:1px solid var(--br);box-shadow:0 1px 3px rgba(0,0,0,.06);}

  .comp-hero{background:linear-gradient(135deg,#ff6b00,#ff0080,#7c3aed);padding:32px 16px 24px;text-align:center;position:relative;overflow:hidden;}

  .mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.95);border-top:1px solid var(--br);padding:8px 0;backdrop-filter:blur(8px);}
  .mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;color:var(--t2);background:transparent;border:none;position:relative;}
  .mob-btn.on{color:var(--t1);}
  .mob-label{font-size:10px;font-weight:600;}

  /* Leaderboard live pulse */
  .live-dot{width:8px;height:8px;border-radius:50%;background:#00ba7c;animation:pulse 1.5s infinite;display:inline-block;margin-right:6px;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;background:#fff;margin-bottom:8px;border:1px solid #eff3f4;box-shadow:0 1px 2px rgba(0,0,0,.04);}

  /* Search page */
  .search-page{position:fixed;inset:0;background:#fff;z-index:80;display:flex;flex-direction:column;}
  .search-result{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--br);cursor:pointer;transition:background .15s;}
  .search-result:hover{background:#f7f9f9;}

  @media(max-width:1000px){.right{display:none;}}
  @media(max-width:688px){
    .left{display:none;}
    .feed{border:none;max-width:100%;}
    .mob-nav{display:flex;justify-content:space-around;}
    body{padding-bottom:62px;}
  }
  @media(min-width:1000px) and (max-width:1265px){
    .left{width:72px;padding:0;align-items:center;}
    .nl{display:none;}
    .sell-btn{display:none;}
    .acct-meta{display:none;}
    .sell-mini{display:flex!important;}
  }
  .sell-mini{display:none;width:50px;height:50px;border-radius:50%;background:var(--ac);align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;border:none;}
  .fade{animation:fadeIn .2s ease forwards;}
  .srch-box{display:flex;align-items:center;gap:10px;background:#f7f9f9;border:1px solid transparent;border-radius:var(--r);padding:10px 16px;transition:border-color .15s;margin-bottom:16px;}
  .srch-box:focus-within{border-color:var(--ac);}
  .srch-input{background:transparent;border:none;outline:none;font-size:15px;color:var(--t1);flex:1;font-family:inherit;}
  .srch-input::placeholder{color:var(--t3);}
  .form-sec{background:#fff;border:1px solid var(--br);border-radius:16px;padding:16px;margin-bottom:14px;}
  .uplzone{border:2px dashed var(--br);border-radius:12px;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s;}
  .uplzone:hover{border-color:var(--ac);background:rgba(29,155,240,.03);}
  .sel{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #cfd9de;background:#fff;color:var(--t1);font-size:15px;outline:none;appearance:none;}
  .tl-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;background:#fff;border:1px solid #eff3f4;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .part-row{padding:14px 16px;border-radius:12px;background:#fff;border:1px solid #eff3f4;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .dash-row{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--br);cursor:pointer;transition:background .15s;align-items:center;}
  .dash-row:hover{background:#f7f9f9;}
  .icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--br);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .icon-btn:hover{background:#f7f9f9;}
  .refcode-valid{border-color:#00ba7c!important;background:rgba(0,186,124,.05)!important;}
  .refcode-invalid{border-color:#f91880!important;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .rs-slide{touch-action:pan-y;scroll-snap-stop:always;}
`;



// ─── BACKEND ─────────────────────────────────────────────────────────────────
const API = "https://claudversion.onrender.com"; // 👈 Replace with your Render URL after deploying backend
const getToken = () => localStorage.getItem("ds_token");
const getUser  = () => { try{ return JSON.parse(localStorage.getItem("ds_user")||"null"); }catch{ return null; } };

const AV_COLS = ["#e91e63","#8b5cf6","#059669","#0891b2","#d97706","#db2777","#ef4444","#0ea5e9","#7c3aed","#16a34a"];
const avatarColor = n => { let h=0; for(let i=0;i<(n||"U").length;i++) h=(h*31+(n||"U").charCodeAt(i))&0xffffffff; return AV_COLS[Math.abs(h)%AV_COLS.length]; };
const timeAgo = d => { const s=(Date.now()-new Date(d))/1000; if(s<60)return"just now"; if(s<3600)return Math.floor(s/60)+"m"; if(s<86400)return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d"; };

const normAd = (a, sv=[]) => ({
  id:a._id||a.id, _id:a._id||a.id,
  title:a.title||"", desc:a.description||"", price:a.price||0,
  cat:a.category||"", loc:a.location||a.city||"", city:a.city||a.location||"",
  views:a.views||0, liked:a.isLiked||a.is_liked||false,
  saved:sv.includes(a._id||a.id),
  promo:a.isFeatured||a.is_featured||a.isPromoted||a.is_promoted||false,
  time:a.createdAt||a.created_at?timeAgo(a.createdAt||a.created_at):"",

// ─── COUNTDOWN ───────────────────────────────────────────────────────────────
function useCountdown(target) {
  const [t, setT] = useState({d:0,h:0,m:0,s:0});
  useEffect(() => {
    const tick = () => {
      const diff = Math.max(0, new Date(target).getTime() - Date.now());
      const s = Math.floor(diff / 1000);
      setT({d:Math.floor(s/86400),h:Math.floor((s%86400)/3600),m:Math.floor((s%3600)/60),s:s%60});
    };
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, [target]);
  return t;
}

// ─── SHARE MODAL ─────────────────────────────────────────────────────────────
// Builds a Story-card PNG in-browser via Canvas, then uses navigator.share()
// to hand it directly to Instagram (or any native share sheet).
const ShareModal = ({ onClose, url, reel }) => {
  const shareUrl = url || "https://dealsara.com/reel/1";
  const [tab, setTab]         = useState("people"); // "people" | "other" | "instagram"
  const [sentTo, setSentTo]   = useState({});
  const [copied, setCopied]   = useState(false);
  const [igState, setIgState] = useState("idle"); // "idle"|"building"|"sharing"|"done"|"fallback"
  const canvasRef             = useRef(null);

  // ── Build a 1080×1920 Story card on a hidden canvas ──────────────────────
  const buildStoryImage = useCallback(() => {
    return new Promise((resolve) => {
      const W = 1080, H = 1920;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      // Background gradient from reel.bg or default
      const gradColors = reel
        ? ["#ff6b00","#c0174a","#1a1a2e"]
        : ["#ff6b00","#7c3aed","#0f1419"];

      const grad = ctx.createLinearGradient(0,0,W,H);
      grad.addColorStop(0,   gradColors[0]);
      grad.addColorStop(0.5, gradColors[1]);
      grad.addColorStop(1,   gradColors[2]);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);

      // Dark vignette overlay bottom
      const vig = ctx.createLinearGradient(0, H*0.55, 0, H);
      vig.addColorStop(0,"rgba(0,0,0,0)");
      vig.addColorStop(1,"rgba(0,0,0,0.82)");
      ctx.fillStyle = vig;
      ctx.fillRect(0,0,W,H);

      // Big emoji centrepiece
      ctx.font = "bold 340px serif";
      ctx.textAlign = "center";
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#fff";
      ctx.fillText(reel?.emoji || "🎬", W/2, H*0.48);
      ctx.globalAlpha = 1;

      // DealSara wordmark – top left
      ctx.font = "bold 68px sans-serif";
      ctx.fillStyle = "#fff";
      ctx.textAlign = "left";
      ctx.fillText("DealSara", 72, 130);

      // Thin accent underline
      ctx.fillStyle  = "#ff6b00";
      ctx.fillRect(72, 148, 340, 7);

      // Play-button circle
      const cx = W/2, cy = H*0.42;
      ctx.beginPath();
      ctx.arc(cx, cy, 110, 0, Math.PI*2);
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 7;
      ctx.stroke();
      // Triangle
      ctx.beginPath();
      ctx.moveTo(cx-38, cy-62);
      ctx.lineTo(cx+70, cy);
      ctx.lineTo(cx-38, cy+62);
      ctx.closePath();
      ctx.fillStyle = "#fff";
      ctx.fill();

      // Caption – wrapped
      const caption = reel?.caption?.slice(0,120) || "Watch this reel on DealSara!";
      ctx.font = "54px sans-serif";
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      const words = caption.split(" ");
      let line = "", lines = [], maxW = W - 160;
      words.forEach(w => {
        const test = line ? line+" "+w : w;
        if (ctx.measureText(test).width > maxW) { lines.push(line); line = w; }
        else line = test;
      });
      if (line) lines.push(line);
      lines.slice(0,4).forEach((l,i) => ctx.fillText(l, W/2, H*0.62 + i*78));

      // User handle
      ctx.font = "bold 52px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.textAlign = "center";
      const handle = reel ? "@"+reel.user.toLowerCase().replace(/\s/g,"") : "@dealsara";
      ctx.fillText(handle, W/2, H*0.77);

      // Stats row
      const statsY = H*0.82;
      ctx.font = "bold 48px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      const likes  = reel ? `❤️ ${reel.likes>=1000?(reel.likes/1000).toFixed(1)+"K":reel.likes}` : "❤️ 0";
      const views  = reel ? `👁 ${reel.views>=1000?(reel.views/1000).toFixed(1)+"K":reel.views}` : "👁 0";
      ctx.fillText(`${likes}   ${views}`, W/2, statsY);

      // CTA pill
      const pillW=720, pillH=108, pillX=(W-pillW)/2, pillY=H*0.86;
      ctx.beginPath();
      ctx.roundRect(pillX, pillY, pillW, pillH, 54);
      ctx.fillStyle="#ff6b00";
      ctx.fill();
      ctx.font = "bold 52px sans-serif";
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.fillText("Watch on DealSara  →", W/2, pillY+72);

      // Short URL below pill
      ctx.font = "40px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillText(shareUrl, W/2, H*0.955);

      canvas.toBlob(blob => resolve(blob), "image/png", 0.92);
    });
  }, [reel, shareUrl]);

  // ── Main Instagram share handler ─────────────────────────────────────────
  const shareToInstagramStory = useCallback(async () => {
    setIgState("building");
    try {
      const blob = await buildStoryImage();
      const file = new File([blob], "dealsara-reel.png", { type: "image/png" });

      // navigator.share with files → native OS share sheet (includes Instagram)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        setIgState("sharing");
        await navigator.share({
          files: [file],
          title: reel ? reel.caption.slice(0,60) : "DealSara Reel",
          text: `🎬 Watch this reel on DealSara!\n${shareUrl}`,
        });
        setIgState("done");
        setTimeout(onClose, 1200);
      } else {
        // Desktop or browser doesn't support file sharing → show fallback
        setIgState("fallback");
        // Still offer image download + link copy as fallback
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "dealsara-story.png";
        a.click();
        navigator.clipboard?.writeText(shareUrl).catch(()=>{});
      }
    } catch(err) {
      // User cancelled or error
      if (err.name !== "AbortError") setIgState("fallback");
      else setIgState("idle");
    }
  }, [buildStoryImage, reel, shareUrl, onClose]);

  // ── State-driven Instagram panel ─────────────────────────────────────────
  const IgPanel = () => {
    if (igState === "building") return (
      <div style={{textAlign:"center",padding:"40px 0"}}>
        <div style={{fontSize:52,marginBottom:16}}>🎨</div>

        <div style={{color:"#888",fontSize:13,marginTop:8}}>Creating a beautiful 1080×1920 image</div>
        <div style={{margin:"20px auto",width:48,height:48,border:"3px solid #333",borderTop:"3px solid #ff6b00",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      </div>
    );

    if (igState === "sharing") return (
      <div style={{textAlign:"center",padding:"40px 0"}}>
        <div style={{fontSize:52,marginBottom:16}}>📤</div>
        <div style={{color:"#fff",fontWeight:700,fontSize:17}}>Native share sheet opened!</div>
        <div style={{color:"#aaa",fontSize:13,marginTop:8,lineHeight:1.6}}>
          Select <b style={{color:"#fff"}}>Instagram</b> from the sheet,<br/>
          then tap <b style={{color:"#fff"}}>Your Story</b> to post.
        </div>
      </div>

    if (igState === "done") return (
      <div style={{textAlign:"center",padding:"40px 0"}}>

        <div style={{textAlign:"center",marginBottom:16}}>

          <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Story image downloaded!</div>
          <div style={{color:"#aaa",fontSize:12,marginTop:4}}>Link also copied. Follow these steps:</div>
        </div>
        {[
          {n:1, icon:"📂", text:"Open Instagram on your phone"},
          {n:2, icon:"➕", text:"Tap + → Story"},
          {n:3, icon:"🖼️", text:"Select the downloaded image from gallery"},
          {n:4, icon:"🔗", text:"Add link sticker · paste the copied URL"},

        ].map(s=>(

// ─── COMPETITION SLIDER ───────────────────────────────────────────────────────
const CompSlider = ({ onNav, customComps = [] }) => {
  const [idx, setIdx] = useState(0);
  // Default competition always first, then admin-added ones
  const allComps = [
    { _isDefault: true },
    ...customComps.filter(c => c.active !== false),
  ];
  const total = allComps.length;
  const prev = () => setIdx(i => (i - 1 + total) % total);
  const next = () => setIdx(i => (i + 1) % total);

  if (total === 0) return null;

  const current = allComps[idx];
  return (
    <div style={{position:"relative"}}>
      <CompBannerSlide
        comp={current._isDefault ? null : current}
        onNav={onNav}
        isCustom={!current._isDefault}
      />
      {total > 1 && (
        <>
          {/* Left arrow */}
          <button onClick={e=>{e.stopPropagation();prev();}} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",width:30,height:30,borderRadius:"50%",background:"rgba(0,0,0,.45)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,color:"#fff",flexShrink:0}}>

// ─── VIDEO AUTOPLAY ENGINE ────────────────────────────────────────────────────
// Single global IntersectionObserver for ALL videos — most reliable on Chrome.
// Attach data-autoplay to any <video> and this handles play/pause automatically.
const autoplayObserver = typeof IntersectionObserver !== "undefined"
  ? new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const v = entry.target;
        if (entry.isIntersecting) {
          // Chrome requires muted for autoplay — always set it
          v.muted = true;
          v.play().catch(() => {});
        } else {
          v.pause();
          v.currentTime = 0;
        }
      });
    }, { threshold: 0.4 })
  : null;

// Hook: attach/detach from global observer
function useAutoplay(ref) {
  useEffect(() => {
    const el = ref.current;
    if (!el || !autoplayObserver) return;
    autoplayObserver.observe(el);
    return () => autoplayObserver.unobserve(el);
  }, [ref]);
}

const ReelSlide = ({ reel, isActive, globalMuted, onToggleMute, onLike, onComment, onBookmark, onFollow }) => {
  const videoRef = useRef(null);
  const [showHeart, setShowHeart] = useState(false);
  const [buffering, setBuffering] = useState(false);
  const [progress, setProgress] = useState(0);
  const [followed, setFollowed] = useState(reel.isFollowing||false);
  const lastTap = useRef(0);
  const rid = reel.id||reel._id;

  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    if (isActive) { v.currentTime = 0; v.muted = globalMuted; v.play().catch(()=>{}); }
    else { v.pause(); v.currentTime = 0; setProgress(0); }
  }, [isActive]);

  useEffect(() => { if (videoRef.current) videoRef.current.muted = globalMuted; }, [globalMuted]);

  useEffect(() => {
    const v = videoRef.current;
    if (!v || !isActive) return;
    const fn = () => { if (v.duration) setProgress(v.currentTime/v.duration*100); };
    v.addEventListener("timeupdate", fn);
    return () => v.removeEventListener("timeupdate", fn);
  }, [isActive]);

  const handleTap = e => {
    if (e.target.closest("button")) return;
    const now = Date.now();
    if (now - lastTap.current < 300) {
      setShowHeart(true);
      setTimeout(() => setShowHeart(false), 900);
      onLike(rid);
    } else {
      onToggleMute();
    }
    lastTap.current = now;
  };

  const userName = reel.user || "User";

  return (
    <div style={{position:"relative",height:"100dvh",background:"#000",overflow:"hidden"}} onClick={handleTap}>
      {reel.videoUrl
        ? <video ref={videoRef} src={reel.videoUrl} poster={reel.thumbnail||undefined} loop playsInline preload="metadata" muted={globalMuted}
            onWaiting={()=>setBuffering(true)} onCanPlay={()=>setBuffering(false)} onPlaying={()=>setBuffering(false)}
            style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
        : <div style={{position:"absolute",inset:0,background:reel.bg||"linear-gradient(135deg,#1a1a2e,#16213e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:100,opacity:.12}}>🎬</div>

        <div style={{height:"100%",width:progress+"%",background:"#fff"}}/>
      </div>
      {buffering && isActive && (
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:30,pointerEvents:"none"}}>
          <div style={{width:48,height:48,borderRadius:"50%",border:"3px solid rgba(255,255,255,.3)",borderTopColor:"#fff",animation:"spin .8s linear infinite"}}/>
        </div>
      )}
      {showHeart && (
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:40,pointerEvents:"none"}}>
          <svg width="120" height="120" viewBox="0 0 24 24" fill="#f91880" className="hb" style={{filter:"drop-shadow(0 0 20px rgba(249,24,128,.8))"}}>
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
      )}
      <button onClick={e=>{e.stopPropagation();onToggleMute();}} style={{position:"absolute",top:50,right:14,zIndex:30,width:36,height:36,borderRadius:"50%",background:"rgba(0,0,0,.45)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><I.Mute m={globalMuted}/></button>
      <div className="reel-right" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:4}}>
          {reel.userAvatar
            ? <img src={reel.userAvatar} style={{width:44,height:44,borderRadius:"50%",objectFit:"cover",border:"2px solid #fff"}} onError={e=>e.target.style.display="none"}/>

// ─── REELS VIEW — native scroll-snap + IntersectionObserver ──────────────────
const ReelsView = ({ reels, setReels, startIdx, onClose, onComment, toast, authToken }) => {
  const [currentIdx, setCurrentIdx] = useState(startIdx);
  const [globalMuted, setGlobalMuted] = useState(false);
  const containerRef = useRef(null);
  const obsRef = useRef(null);

  useEffect(() => {
    const el = containerRef.current;
    if (!el || !reels.length) return;
    if (obsRef.current) obsRef.current.disconnect();
    obsRef.current = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setCurrentIdx(parseInt(e.target.dataset.idx||"0",10)); });
    }, { root: el, threshold: 0.6 });
    el.querySelectorAll(".rs-slide").forEach(s => obsRef.current.observe(s));
    return () => obsRef.current?.disconnect();
  }, [reels]);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    requestAnimationFrame(() => el.scrollTo({ top: startIdx * window.innerHeight, behavior: "instant" }));
  }, []);

  useEffect(() => {
    const fn = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [onClose]);

  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);

  const handleLike = useCallback(id => {
    setReels(p => p.map(r => (r.id||r._id)===id ? {...r, liked:!r.liked, likes:r.liked?Math.max(0,r.likes-1):r.likes+1} : r));
    if (authToken) fetch(API+"/api/reels/"+id+"/like", {method:"POST", headers:{Authorization:"Bearer "+authToken}}).catch(()=>{});
  }, [authToken, setReels]);

  const handleBookmark = useCallback(id => {
    setReels(p => p.map(r => (r.id||r._id)===id ? {...r, saved:!r.saved} : r));
  }, [setReels]);

  const handleFollow = useCallback((id, f) => toast(f ? "✅ Following!" : "Unfollowed"), [toast]);

  return (
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:200}}>
      <button onClick={onClose} style={{position:"fixed",top:14,left:14,zIndex:300,width:38,height:38,borderRadius:"50%",background:"rgba(0,0,0,.6)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:300,background:"rgba(0,0,0,.5)",borderRadius:20,padding:"3px 12px",color:"#fff",fontSize:12,fontWeight:600,pointerEvents:"none"}}>{currentIdx+1} / {reels.length}</div>
      <div ref={containerRef} style={{position:"absolute",inset:0,overflowY:"scroll",scrollSnapType:"y mandatory",scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
        {reels.map((reel, i) => (
          <div key={reel.id||reel._id||i} data-idx={String(i)} className="rs-slide" style={{height:"100dvh",scrollSnapAlign:"start",scrollSnapStop:"always"}}>
            <ReelSlide reel={reel} isActive={i===currentIdx} globalMuted={globalMuted} onToggleMute={()=>setGlobalMuted(m=>!m)}
              onLike={handleLike} onComment={onComment} onBookmark={handleBookmark} onFollow={handleFollow}/>
          </div>
        ))}
      </div>
    </div>
  );
};

const BottomSheet = ({ onClose, children, maxH="85dvh", bg="#111", light=false }) => {
  const sheetRef = useRef(null);
  const overlayRef = useRef(null);
  const bodyRef = useRef(null);
  const startY = useRef(0);
  const curY   = useRef(0);
  const isDragging = useRef(false);
  const [sheetY, setSheetY]   = useState(0);
  const [closing, setClosing] = useState(false);

  const doClose = useCallback(() => {
    setClosing(true);
    setSheetY(window.innerHeight);
    setTimeout(onClose, 260);
  }, [onClose]);

  const onTouchStart = useCallback((e) => {
    const body = bodyRef.current;
    if (body && body.scrollTop > 2) return;
    startY.current   = e.touches[0].clientY;
    curY.current      = 0;
    isDragging.current = true;
  }, []);

  const onTouchMove = useCallback((e) => {
    if (!isDragging.current) return;
    const d = e.touches[0].clientY - startY.current;
    if (d < 0) { isDragging.current = false; return; }
    curY.current = d;
    e.preventDefault();
    setSheetY(d);
  }, []);

  const onTouchEnd = useCallback(() => {
    if (!isDragging.current) return;
    isDragging.current = false;
    if (curY.current > 140) doClose();
    else setSheetY(0);
  }, [doClose]);

  useEffect(() => {
    const el = sheetRef.current;
    if (!el) return;
    const opts = { passive: false };
    el.addEventListener("touchstart", onTouchStart, opts);
    el.addEventListener("touchmove",  onTouchMove,  opts);
    el.addEventListener("touchend",   onTouchEnd,   opts);
    return () => {
      el.removeEventListener("touchstart", onTouchStart, opts);
      el.removeEventListener("touchmove",  onTouchMove,  opts);
      el.removeEventListener("touchend",   onTouchEnd,   opts);
    };
  }, [onTouchStart, onTouchMove, onTouchEnd]);

  const overlayAlpha = closing ? 0 : Math.max(0, 1 - sheetY / 280);
  const sheetOpacity = closing ? 0 : Math.max(0.25, 1 - sheetY / 380);

  return (
    <div
      ref={overlayRef}
      style={{
        position:"fixed",inset:0,
        background:`rgba(0,0,0,${light ? 0.5*overlayAlpha : 0.65*overlayAlpha})`,
        zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",
        transition: (closing || isDragging.current) ? "none" : "background .15s",
      }}
      onClick={doClose}
    >
      <div
        ref={sheetRef}
        style={{
          width:"100%",maxWidth:520,
          background: bg,
          borderTopLeftRadius:24,borderTopRightRadius:24,
          maxHeight: maxH,
          display:"flex",flexDirection:"column",
          overflow:"hidden",
          willChange:"transform",
          transform: `translateY(${sheetY}px)`,
          opacity: sheetOpacity,
          transition: isDragging.current ? "none" : "transform 0.28s cubic-bezier(.32,.72,0,1), opacity 0.28s",
          animation: closing ? "none" : "slideUp 0.3s cubic-bezier(.32,.72,0,1) both",
          boxShadow:"0 -8px 40px rgba(0,0,0,.35)",
        }}
        onClick={e => e.stopPropagation()}
      >
        {/* Drag pill handle */}
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 6px",flexShrink:0,userSelect:"none",cursor:"grab"}}>
          <div style={{width:36,height:4,borderRadius:2,background:light?"#ccc":"#555"}}/>
        </div>
        {/* Sheet body */}
        <div ref={bodyRef} style={{flex:1,overflowY:"auto",scrollbarWidth:"none",display:"flex",flexDirection:"column"}}>
          {children}
        </div>
      </div>
    </div>
  );
};

    try {

      const ep = cid ? "/api/chat/conversations/"+cid+"/message" : "/api/chat/start";
      const body = cid ? {message:t} : {adId,message:t};
      const r = await fetch(API+ep,{method:"POST",headers:{Authorization:"Bearer "+authToken,"Content-Type":"application/json"},body:JSON.stringify(body)});
      if (r.ok) {
        const d = await r.json();
        if (!cid) setCid(d.conversationId||d.conversation?._id);
      }

    setSending(false);
  };

  );

      content=<img src={m.text} style={{width:200,borderRadius:12,display:"block"}} onError={e=>e.target.style.display="none"}/>;

      </div>;
    } else {
      content=<div className={m.me?"msg-me":"msg-them"} style={{...bubble}}>{m.text}</div>;
    }
    return (
      <div key={m._id||i} style={{display:"flex",justifyContent:m.me?"flex-end":"flex-start",marginBottom:8,alignItems:"flex-end",gap:6}}>
        {!m.me && <Av name={sellerName} color={sellerColor} size="sm"/>}
        <div>
          {content}
          <div style={{fontSize:11,color:"var(--t3)",marginTop:3,display:"flex",alignItems:"center",justifyContent:m.me?"flex-end":"flex-start",gap:2}}>
            <span>{m.time}</span>
            {m.me && <Tick read={m.read}/>}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{position:"fixed",inset:0,background:"var(--bg)",zIndex:100,display:"flex",flexDirection:"column"}}>
      {videoCall && <VideoCallOverlay onEnd={()=>setVideoCall(false)} peerName={sellerName} peerColor={sellerColor}/>}
      <div className="sth" style={{flexShrink:0}}><div className="sth-inner">
        <button onClick={onBack} style={{width:36,height:36,borderRadius:"50%",border:"none",background:"var(--el)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><I.Back/></button>
        {target?.imgs?.[0] ? <img src={target.imgs[0]} style={{width:44,height:44,objectFit:"cover",borderRadius:8,flexShrink:0}} onError={e=>e.target.style.display="none"}/> : <Av name={sellerName} color={sellerColor} size="lg"/>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{adTitle}</div>
          <div style={{fontSize:13,color:"var(--ac)",fontWeight:700}}>{adPrice&&adPrice+" · "}{sellerName}</div>
        </div>
        <button onClick={()=>setVideoCall(true)} style={{width:36,height:36,borderRadius:"50%",border:"none",background:"var(--el)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:"auto",flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>
      </div></div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column"}}>
        {loading && <div style={{textAlign:"center",padding:32,color:"var(--t2)"}}>Loading messages…</div>}
        {!loading && msgs.length===0 && <div style={{textAlign:"center",padding:"48px 16px",color:"var(--t2)"}}><div style={{fontSize:40,marginBottom:8}}>💬</div><div>Start the conversation!</div></div>}

const VideoCallOverlay = ({ onEnd, peerName, peerColor }) => {
  const localRef  = useRef(null);
  const remoteRef = useRef(null);
  const streamRef = useRef(null);
  const [callState, setCallState]   = useState("requesting"); // requesting|calling|active|error
  const [muted, setMuted]           = useState(false);
  const [camOff, setCamOff]         = useState(false);
  const [speaker, setSpeaker]       = useState(true);
  const [duration, setDuration]     = useState(0);
  const timerRef = useRef(null);
  const errRef   = useRef("");

  const fmtDur = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  // Step 1: ask permission & start local preview
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
        if (cancelled) { stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        if (localRef.current) { localRef.current.srcObject = stream; }
        setCallState("calling");
        // Simulate "ringing" for 2.5s then connect
        setTimeout(() => {
          if (cancelled) return;
          setCallState("active");
          // Mirror local video as "remote" (production: replace with RTCPeerConnection)
          if (remoteRef.current) { remoteRef.current.srcObject = stream; }
          timerRef.current = setInterval(() => setDuration(d => d+1), 1000);
        }, 2500);
      } catch(err) {
        if (cancelled) return;
        if (err.name === "NotAllowedError") {
          // Immediately try to open device settings — no error screen shown
          // iOS Safari
          window.location.href = "app-settings:";
          // Fallback for Android/Chrome after 300ms (if iOS link didn't work)
          setTimeout(() => {
            // Chrome Android: open site settings for camera
            window.open("chrome://settings/content/camera", "_blank");
          }, 300);
          // Also show a brief browser-level prompt instruction via alert (most reliable cross-browser)
          setTimeout(() => {
            alert("Please allow Camera & Microphone in your browser settings, then come back and try again.\n\nOn Chrome: tap the 🔒 lock icon in the address bar → Permissions → Allow Camera & Microphone.");
            onEnd(); // close call
          }, 400);
        } else {
          errRef.current = err.message;
          setCallState("error");
        }
      }
    })();
    return () => {
      cancelled = true;
      clearInterval(timerRef.current);
      streamRef.current?.getTracks().forEach(t=>t.stop());
    };
  }, []);

  const hangUp = useCallback(() => {
    clearInterval(timerRef.current);
    streamRef.current?.getTracks().forEach(t=>t.stop());
    onEnd();
  }, [onEnd]);

  const toggleMic = () => {
    const audioTrack = streamRef.current?.getAudioTracks()[0];
    if (audioTrack) { audioTrack.enabled = !audioTrack.enabled; setMuted(m=>!m); }
  };

  const toggleCam = () => {
    const videoTrack = streamRef.current?.getVideoTracks()[0];
    if (videoTrack) { videoTrack.enabled = !videoTrack.enabled; setCamOff(c=>!c); }
  };

  const flipCam = async () => {
    const current = streamRef.current?.getVideoTracks()[0];
    if (!current) return;
    const currentFacing = current.getSettings().facingMode || "user";
    const nextFacing = currentFacing === "user" ? "environment" : "user";
    try {
      const newStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode: nextFacing }, audio:true });
      const oldAudio = streamRef.current?.getAudioTracks()[0];
      const newVideo = newStream.getVideoTracks()[0];
      // Swap video track
      if (localRef.current) localRef.current.srcObject = newStream;
      if (remoteRef.current && callState==="active") remoteRef.current.srcObject = newStream;
      streamRef.current?.getTracks().forEach(t=>t.stop());
      streamRef.current = newStream;
      if (muted) newStream.getAudioTracks()[0].enabled = false;
    } catch(e) {}
  };

  return (
    <div style={{position:"absolute",inset:0,zIndex:200,background:"#0a0a16",display:"flex",flexDirection:"column"}}>

      {/* Error state — only for non-permission hardware errors */}
      {callState==="error" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,gap:16,textAlign:"center"}}>
          <div style={{fontSize:56}}>⚠️</div>
          <div style={{color:"#fff",fontWeight:700,fontSize:17}}>{errRef.current||"Camera unavailable"}</div>
          <div style={{color:"rgba(255,255,255,.55)",fontSize:13}}>Check that no other app is using your camera.</div>
          <button onClick={hangUp} style={{padding:"12px 28px",borderRadius:14,background:"#ef4444",border:"none",color:"#fff",fontWeight:700,fontSize:16,cursor:"pointer",marginTop:8}}>Close</button>
        </div>
      )}

      {/* Requesting state */}
      {callState==="requesting" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{width:80,height:80,borderRadius:"50%",background:peerColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:700,color:"#fff"}}>{peerName[0]}</div>
          <div style={{color:"#fff",fontSize:16}}>Requesting camera access…</div>
          <div style={{width:36,height:36,border:"3px solid #333",borderTop:"3px solid var(--ac)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
        </div>
      )}

      {/* Calling / Active state */}
      {(callState==="calling"||callState==="active") && (
        <>
          {/* Remote video (full screen) */}
          <div style={{position:"absolute",inset:0,background:"#111",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {callState==="active" ? (
              <video ref={remoteRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            ) : (
              /* Ringing state — show avatar */
              <div style={{textAlign:"center"}}>
                <div style={{width:110,height:110,borderRadius:"50%",background:peerColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,fontWeight:700,color:"#fff",margin:"0 auto 20px",boxShadow:"0 0 0 12px rgba(255,255,255,.08),0 0 0 24px rgba(255,255,255,.04)"}}>
                  {peerName[0]}
                </div>
                <div style={{color:"#fff",fontSize:22,fontWeight:700,marginBottom:8}}>{peerName}</div>
                <div style={{color:"rgba(255,255,255,.65)",fontSize:15}}>Calling…</div>
              </div>
            )}
          </div>

          {/* Self preview PiP — top right */}
          <div style={{position:"absolute",top:56,right:12,width:88,height:120,borderRadius:14,overflow:"hidden",border:"2px solid rgba(255,255,255,.25)",zIndex:10,background:"#222"}}>
            {camOff ? (
              <div style={{width:"100%",height:"100%",background:"#222",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🚫</div>
            ) : (
              <video ref={localRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover",transform:"scaleX(-1)"}}/>
            )}
          </div>

          {/* Duration badge */}
          {callState==="active" && (
            <div style={{position:"absolute",top:16,left:0,right:0,display:"flex",justifyContent:"center",zIndex:10}}>
              <div style={{background:"rgba(0,0,0,.55)",borderRadius:20,padding:"4px 16px",display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#00ba7c",animation:"pulse 1s infinite"}}/>
                <span style={{color:"#fff",fontSize:14,fontWeight:700}}>{fmtDur(duration)}</span>
              </div>
            </div>
          )}

          {/* Controls bar */}
          <div style={{position:"absolute",bottom:40,left:0,right:0,display:"flex",justifyContent:"center",alignItems:"center",gap:20,zIndex:10}}>
            {/* Mic */}
            <button onClick={toggleMic} style={{width:56,height:56,borderRadius:"50%",background:muted?"rgba(255,255,255,.9)":"rgba(255,255,255,.18)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,transition:"background .2s"}}>
              {muted ? "🔇" : "🎤"}
            </button>
            {/* Hang up */}
            <button onClick={hangUp} style={{width:68,height:68,borderRadius:"50%",background:"#ef4444",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 24px rgba(239,68,68,.6)",transition:"transform .1s"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.11 6.11l1.89-1.89a2 2 0 0 1 2.11-.45c.9.36 1.85.6 2.81.7A2 2 0 0 1 22 16.92z" transform="rotate(135 12 12)"/></svg>
            </button>
            {/* Camera */}
            <button onClick={toggleCam} style={{width:56,height:56,borderRadius:"50%",background:camOff?"rgba(255,255,255,.9)":"rgba(255,255,255,.18)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,transition:"background .2s"}}>
              {camOff ? "📵" : "📷"}
            </button>
          </div>

          {/* Flip camera — top left */}
          <button onClick={flipCam} style={{position:"absolute",top:16,left:12,width:40,height:40,borderRadius:"50%",background:"rgba(0,0,0,.5)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,fontSize:18}}>
            🔄
          </button>
        </>
      )}
    </div>
  );
};

      if ((i+1)%4===0 && ri<reels.length) { feed.push({type:"reel",data:reels[ri],reelIdx:ri}); ri++; }

{filteredFeed.length===0 && !loading && (

const SearchPage = ({ onBack, toast, ads, reels, onNav, onOpenReels }) => {
  const [query, setQuery] = useState("");
  const [activeTab, setActiveTab] = useState("all");
  const [followed, setFollowed] = useState({});
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const q = query.trim().toLowerCase();

  const matchedProfiles = q ? FOLLOWERS.filter(u =>
    u.name.toLowerCase().includes(q) ||
    u.handle.toLowerCase().includes(q) ||
    u.city.toLowerCase().includes(q)
  ) : FOLLOWERS;

  const matchedAds = q ? (ads || ADS).filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.desc.toLowerCase().includes(q) ||
    a.cat.toLowerCase().includes(q) ||
    a.loc.toLowerCase().includes(q) ||
    a.user.toLowerCase().includes(q)
  ) : [];

  const matchedReels = q ? (reels || REELS_INIT).filter(r =>
    r.caption.toLowerCase().includes(q) ||
    r.user.toLowerCase().includes(q) ||
    r.audio.toLowerCase().includes(q)
  ) : [];

  const totalResults = matchedProfiles.length + matchedAds.length + matchedReels.length;
  const tabs = [
    {id:"all",label:"All",count:totalResults},
    {id:"people",label:"People",count:matchedProfiles.length},
    {id:"ads",label:"Ads",count:matchedAds.length},
    {id:"reels",label:"Reels",count:matchedReels.length},
  ];

  const toggleFollow = (handle) => {
    setFollowed(prev => {
      const next = {...prev, [handle]: !prev[handle]};
      toast(next[handle] ? `✅ Following @${handle}!` : `Unfollowed @${handle}`);
      return next;
    });
  };

  const showPeople = (activeTab === "all" || activeTab === "people");
  const showAds = (activeTab === "all" || activeTab === "ads");
  const showReels = (activeTab === "all" || activeTab === "reels");

  return (
    <div className="search-page">
      {/* Search header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"1px solid var(--br)",background:"#fff",position:"sticky",top:0,zIndex:10}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:"50%",border:"none",background:"var(--el)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"var(--t1)"}}><I.Back/></button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8,background:"#f7f9f9",borderRadius:"var(--r)",padding:"10px 16px",border:"1px solid var(--br)",transition:"border-color .15s"}} onFocus={e=>e.currentTarget.style.borderColor="var(--ac)"} onBlur={e=>e.currentTarget.style.borderColor="var(--br)"}>
          <I.Search/>
          <input
            ref={inputRef}
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder="Search profiles, ads, reels…"
            style={{background:"transparent",border:"none",outline:"none",fontSize:15,color:"var(--t1)",flex:1,fontFamily:"inherit"}}
          />
          {query && <button onClick={()=>setQuery("")} style={{background:"none",border:"none",cursor:"pointer",color:"var(--t3)",fontSize:18,lineHeight:1}}>×</button>}
        </div>
      </div>

      {/* Category tabs */}
      {q && (
        <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid var(--br)",scrollbarWidth:"none",background:"#fff",position:"sticky",top:61,zIndex:9}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flex:"0 0 auto",padding:"12px 16px",background:"transparent",border:"none",borderBottom:`2px solid ${activeTab===t.id?"var(--ac)":"transparent"}`,color:activeTab===t.id?"var(--t1)":"var(--t2)",fontWeight:activeTab===t.id?700:500,fontSize:14,cursor:"pointer",whiteSpace:"nowrap"}}>
              {t.label} {t.count>0&&<span style={{background:"var(--el)",borderRadius:"var(--r)",padding:"1px 7px",fontSize:12,marginLeft:4,fontWeight:600}}>{t.count}</span>}

      <div style={{overflowY:"auto",flex:1}}>
        {/* No query: show suggested */}
        {!q && (
          <div style={{padding:"8px 0"}}>
            <div style={{fontWeight:700,fontSize:15,color:"var(--t2)",padding:"8px 16px 4px"}}>Suggested People</div>

              <div key={i} className="search-result">

                  <div style={{fontWeight:700,fontSize:15}}>{u.name}</div>

                  {followed[u.handle]||u.following?"Following":"Follow"}

          </div>

        {/* Has query, no results */}
        {q && totalResults === 0 && (
          <div style={{padding:"48px 16px",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔍</div>
            <div style={{fontWeight:700,fontSize:18,marginBottom:8}}>No results for "{query}"</div>
            <div style={{fontSize:14,color:"var(--t2)"}}>Try different keywords — search names, locations, categories</div>

        {/* People results */}
        {q && showPeople && matchedProfiles.length > 0 && (
          <div>
            {activeTab==="all" && <div style={{fontWeight:700,fontSize:14,color:"var(--t2)",padding:"12px 16px 4px",background:"#f7f9f9",borderBottom:"1px solid var(--br)"}}>👤 PEOPLE</div>}
            {matchedProfiles.map((u,i)=>(
              <div key={i} className="search-result">
                <Av name={u.name} color={u.color} size="lg"/>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>{onBack();onNav("profile");}}>
                  <div style={{fontWeight:700,fontSize:15}}>{u.name}</div>
                  <div style={{fontSize:13,color:"var(--t2)"}}>@{u.handle} · {u.city}</div>
                  <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>🎬 {u.reels} reels · 📋 {u.ads} ads</div>
                </div>
                <button onClick={()=>toggleFollow(u.handle)} style={{padding:"6px 16px",borderRadius:"var(--r)",border:followed[u.handle]||u.following?"1px solid var(--br)":"none",background:followed[u.handle]||u.following?"transparent":"var(--t1)",color:followed[u.handle]||u.following?"var(--t1)":"#fff",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
                  {followed[u.handle]||u.following?"Following":"Follow"}

        {/* Ads results */}
        {q && showAds && matchedAds.length > 0 && (
          <div>
            {activeTab==="all" && <div style={{fontWeight:700,fontSize:14,color:"var(--t2)",padding:"12px 16px 4px",background:"#f7f9f9",borderBottom:"1px solid var(--br)"}}>📋 ADS & POSTS</div>}
            {matchedAds.map((a,i)=>(
              <div key={i} className="search-result" style={{alignItems:"flex-start",gap:12,cursor:"pointer"}} onClick={()=>{onBack();onNav("ad-detail",a.id);}}>
                <div style={{width:56,height:56,borderRadius:10,overflow:"hidden",background:"var(--el)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--br)"}}>
                  {a.imgs?.[0] ? <img src={a.imgs[0]} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/> : <span style={{fontSize:22}}>📦</span>}

                  <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title}</div>
                  <div style={{fontSize:13,color:"var(--t2)",marginTop:2}}>{a.user} · {a.loc}</div>
                  <div style={{display:"flex",gap:6,marginTop:6}}>
                    <span style={{background:"var(--acd)",color:"var(--ac)",padding:"2px 10px",borderRadius:"var(--r)",fontSize:12,fontWeight:700}}>{fmtP(a.price)}</span>
                    <span style={{background:"#f7f9f9",color:"var(--t2)",padding:"2px 10px",borderRadius:"var(--r)",fontSize:12,border:"1px solid var(--br)"}}>{a.cat}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Reels results */}
        {q && showReels && matchedReels.length > 0 && (
          <div>
            {activeTab==="all" && <div style={{fontWeight:700,fontSize:14,color:"var(--t2)",padding:"12px 16px 4px",background:"#f7f9f9",borderBottom:"1px solid var(--br)"}}>🎬 REELS</div>}
            {matchedReels.map((r,i)=>(
              <div key={i} className="search-result" style={{alignItems:"flex-start",gap:12,cursor:"pointer"}} onClick={()=>{
                const reelIdx = (reels||REELS_INIT).findIndex(r2=>r2.id===r.id);
                onBack();
                onOpenReels(reelIdx>=0?reelIdx:0);
              }}>
                <div style={{width:56,height:90,borderRadius:10,overflow:"hidden",flexShrink:0,background:r.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,position:"relative"}}>
                  {r.emoji}
                  <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  </div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,color:"var(--t1)",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{r.caption}</div>

    </div>
  );
};

// ─── DASHBOARD PAGE ────────────────────────────────────────────────────────────
const DashboardPage = ({ ads, setAds, onNav, onChat, toast, authUser, authToken, savedAdIds, deleteAd, onLogin }) => {
  const [tab, setTab] = useState(0);
  const [myAds, setMyAds] = useState([]);
  const [savedAds, setSavedAds] = useState([]);
  const [inbox, setInbox] = useState([]);
  const [stats, setStats] = useState({v:0,a:0,c:0});
  const me = authUser;

  useEffect(() => {
    if (!authToken||!me) return;
    const uid = me._id||me.id;
    const h = {Authorization:"Bearer "+authToken};
    // My ads
    fetch(API+"/api/ads?userId="+uid+"&limit=100",{headers:h}).then(r=>r.json())
      .then(d=>{const a=(d.ads||d.data||[]).map(x=>normAd(x,savedAdIds||[]));setMyAds(a);setStats(s=>({...s,a:a.length,v:a.reduce((t,x)=>t+(x.views||0),0)}));}).catch(()=>{});
    // Saved ads
    fetch(API+"/api/ads/saved/me",{headers:h}).then(r=>r.json())
      .then(d=>setSavedAds((Array.isArray(d)?d:[]).map(x=>normAd(x,[])))).catch(()=>{});
    // Inbox
    fetch(API+"/api/chat/conversations",{headers:h}).then(r=>r.json())
      .then(d=>{const c=Array.isArray(d)?d:[];setInbox(c);setStats(s=>({...s,c:c.length}));}).catch(()=>{});
  }, [authToken, me]);

  if (!me) return (
    <div className="fade" style={{padding:"48px 24px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>🔑</div>
      <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>Sign in to view dashboard</div>
      <button className="btn-a" style={{padding:"10px 24px"}} onClick={onLogin}>Sign in</button>
    </div>
  );

  const handleDel = async id => {
    if (deleteAd) await deleteAd(id);
    setMyAds(p=>p.filter(a=>a.id!==id));
  };

  const Tick = ({read}) => (
    <svg width="14" height="9" viewBox="0 0 16 10" fill="none" style={{flexShrink:0}}>
      <polyline points="1,5 4,8 10,1" stroke={read?"#1da1f2":"#888"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <polyline points="5,5 8,8 14,1" stroke={read?"#1da1f2":"#888"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  return (
    <div className="fade">
      <div className="sth"><div className="sth-inner">
        <div><div style={{fontWeight:800,fontSize:20}}>Dashboard</div><div style={{fontSize:13,color:"var(--t2)"}}>@{(me.name||"user").toLowerCase().replace(/\s/g,"")}</div></div>
        <button className="btn-a" style={{padding:"8px 18px",fontSize:14,marginLeft:"auto"}} onClick={()=>onNav("create")}>+ Create</button>
      </div></div>
      <div className="stat-grid">
        {[{l:"My Ads",v:stats.a},{l:"Views",v:fmtN(stats.v)},{l:"Chats",v:stats.c}].map(s=>(
          <div key={s.l} className="stat-cell"><div style={{fontSize:24,fontWeight:900}}>{s.v}</div><div style={{fontSize:13,color:"var(--t2)",marginTop:2}}>{s.l}</div></div>
        ))}
      </div>
      <div className="tabs">
        {["My Ads","Saved","Messages"].map((t,i)=><button key={t} className={"tab"+(tab===i?" on":"")} onClick={()=>setTab(i)}>{t}</button>)}
      </div>
      {tab===0 && (myAds.length===0
        ? <div style={{padding:"48px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>📦</div><div style={{fontWeight:800,fontSize:20,marginBottom:8}}>No ads yet</div><button className="btn-a" style={{padding:"10px 24px"}} onClick={()=>onNav("create")}>Post your first ad</button></div>
        : myAds.map(ad=>(
          <div key={ad.id} className="dash-row" onClick={()=>onNav("ad-detail",ad.id)}>
            <div style={{width:56,height:56,borderRadius:8,overflow:"hidden",background:"var(--el)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {ad.imgs?.[0]?<img src={ad.imgs[0]} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:<span style={{fontSize:22}}>📦</span>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ad.title}</div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--ac)",marginTop:2}}>{fmtP(ad.price)}</div>
              <div style={{fontSize:12,color:"var(--t2)",marginTop:2}}>👁 {ad.views} · 📍 {ad.loc}</div>
            </div>
            <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
              <button className="icon-btn" onClick={()=>toast("✏️ Edit coming soon!")}><I.Edit/></button>
              <button className="icon-btn" style={{color:"var(--lk)"}} onClick={()=>handleDel(ad.id)}><I.Trash/></button>
            </div>
          </div>
        ))
      )}
      {tab===1 && (savedAds.length===0
        ? <div style={{padding:"48px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>❤️</div><div style={{fontWeight:800,fontSize:20,marginBottom:8}}>No saved ads</div><button className="btn-o" style={{padding:"10px 24px"}} onClick={()=>onNav("home")}>Browse listings</button></div>
        : savedAds.map(ad=>(
          <div key={ad.id} className="dash-row" onClick={()=>onNav("ad-detail",ad.id)}>
            <div style={{width:56,height:56,borderRadius:8,overflow:"hidden",background:"var(--el)",flexShrink:0}}>
              {ad.imgs?.[0]?<img src={ad.imgs[0]} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📦</div>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ad.title}</div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--ac)"}}>{fmtP(ad.price)}</div>
            </div>
          </div>
        ))
      )}
      {tab===2 && (inbox.length===0
        ? <div style={{padding:"48px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>💬</div><div style={{fontWeight:800,fontSize:20,marginBottom:8}}>No messages yet</div></div>
        : inbox.map((conv,i)=>{
          const other = conv.participants?.find(p=>p._id!==(me._id||me.id))||{};
          const last = conv.lastMessage||{};
          const fromMe = last.sender?._id===(me._id||me.id)||last.sender===(me._id||me.id);
          const unread = !fromMe&&(conv.unreadCount||0)>0;
          return (
            <div key={conv._id||i} className="inb-row" onClick={()=>onChat({conversationId:conv._id,title:conv.ad?.title||"Chat",user:other.name||"User",color:avatarColor(other.name||"U")})}>
              <div style={{position:"relative"}}><Av name={other.name||"User"} color={avatarColor(other.name||"U")} size="lg"/>{unread&&<div style={{position:"absolute",top:-2,right:-2,width:10,height:10,borderRadius:"50%",background:"var(--ac)",border:"2px solid var(--bg)"}}/>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontWeight:unread?800:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"65%"}}>{other.name||"User"}</span>
                  <span style={{fontSize:12,color:unread?"var(--ac)":"var(--t2)",flexShrink:0}}>{last.createdAt?timeAgo(last.createdAt):""}</span>
                </div>
                <div style={{fontSize:13,display:"flex",alignItems:"center",gap:3}}>
                  {fromMe&&<Tick read={conv.unreadCount===0}/>}
                  <span style={{color:unread?"var(--t1)":"var(--t2)",fontWeight:unread?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{last.text||last.content||"…"}</span>
                </div>
              </div>
              {unread&&conv.unreadCount>0&&<div style={{width:20,height:20,borderRadius:"50%",background:"var(--ac)",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{conv.unreadCount}</div>}
            </div>
          );
        })
      )}
    </div>
  );
};
