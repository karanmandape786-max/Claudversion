const InboxPage = ({ onChat, authToken }) => {
  const [convs, setConvs] = useState([]);
  const [loading, setLoading] = useState(true);
  const me = getUser();

  useEffect(() => {
    if (!authToken) { setLoading(false); return; }
    fetch(API+"/api/chat/conversations",{headers:{Authorization:"Bearer "+authToken}})
      .then(r=>r.json()).then(d=>setConvs(Array.isArray(d)?d:(d.conversations||[]))).catch(()=>{}).finally(()=>setLoading(false));
  }, [authToken]);

  const Tick = ({read}) => (
    <svg width="14" height="9" viewBox="0 0 16 10" fill="none" style={{flexShrink:0}}>
      <polyline points="1,5 4,8 10,1" stroke={read?"#1da1f2":"#888"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <polyline points="5,5 8,8 14,1" stroke={read?"#1da1f2":"#888"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  return (
    <div className="fade">
      <div className="sth"><div className="sth-inner"><div style={{fontWeight:800,fontSize:20}}>Messages</div></div></div>
      {loading&&[1,2,3].map(i=>(
        <div key={i} style={{display:"flex",gap:12,padding:"16px",borderBottom:"1px solid var(--br)"}}>
          <div style={{width:48,height:48,borderRadius:"50%",background:"var(--el)",flexShrink:0,animation:"pulse 1.5s infinite"}}/>
          <div style={{flex:1}}><div style={{height:14,background:"var(--el)",borderRadius:6,marginBottom:8,animation:"pulse 1.5s infinite"}}/><div style={{height:12,background:"var(--el)",borderRadius:6,width:"70%",animation:"pulse 1.5s infinite"}}/></div>
        </div>
      ))}
      {!loading&&!authToken&&<div style={{padding:"48px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>💬</div><div style={{fontWeight:800,fontSize:20}}>Sign in to view messages</div></div>}
      {!loading&&authToken&&convs.length===0&&<div style={{padding:"48px 24px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>💬</div><div style={{fontWeight:800,fontSize:20,marginBottom:8}}>No messages yet</div><p style={{color:"var(--t2)",fontSize:14}}>Message a seller from any ad listing</p></div>}
      {convs.map((conv,i)=>{
        const uid = me?._id||me?.id;
        const other = conv.participants?.find(p=>p._id!==uid&&p.id!==uid)||{};
        const last = conv.lastMessage||{};
        const fromMe = last.sender?._id===uid||last.sender===uid;
        const unread = !fromMe&&(conv.unreadCount||0)>0;
        const lastTime = last.createdAt ? (() => {
          const d=new Date(last.createdAt),now=new Date();
          return d.toDateString()===now.toDateString()?d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});
        })() : "";
        return (
          <div key={conv._id||i} className="inb-row" onClick={()=>onChat({conversationId:conv._id,title:conv.ad?.title||"Chat",price:conv.ad?.price,user:other.name||"User",color:avatarColor(other.name||"U"),imgs:conv.ad?.images||[]})}>
            <div style={{position:"relative"}}><Av name={other.name||"User"} color={avatarColor(other.name||"U")} size="lg"/>{unread&&<div style={{position:"absolute",top:-2,right:-2,width:10,height:10,borderRadius:"50%",background:"var(--ac)",border:"2px solid var(--bg)"}}/>}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                <span style={{fontWeight:unread?800:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"65%"}}>{other.name||"User"}</span>
                <span style={{fontSize:12,color:unread?"var(--ac)":"var(--t2)",flexShrink:0,fontWeight:unread?700:400}}>{lastTime}</span>
              </div>
              {conv.ad?.title&&<div style={{fontSize:12,color:"var(--ac)",fontWeight:600,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📦 {conv.ad.title}</div>}
              <div style={{fontSize:13,display:"flex",alignItems:"center",gap:3}}>
                {fromMe&&<Tick read={conv.unreadCount===0}/>}
                <span style={{color:unread?"var(--t1)":"var(--t2)",fontWeight:unread?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{last.text||last.content||"Start chatting…"}</span>
              </div>
            </div>
            {unread&&conv.unreadCount>0&&<div style={{width:20,height:20,borderRadius:"50%",background:"var(--ac)",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{conv.unreadCount}</div>}
          </div>
        );
      })}
    </div>
  );
};

const calcPoints = (views, likes) => (views||0)*1 + (likes||0)*2;

const CompetitionPage = ({ toast, authToken, authUser }) => {
  const [tab, setTab] = useState(0);
  const [form, setForm] = useState({name:"",accountName:"",email:"",phone:"",referral:""});
  const [refStatus, setRefStatus] = useState(null);
  const [comp, setComp] = useState(null);
  const [leaderboard, setLeaderboard] = useState([]);
  const [lastUpdate, setLastUpdate] = useState(new Date());
  const [myStatus, setMyStatus] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [compLoading, setCompLoading] = useState(true);
  const cd = useCountdown(comp?.reg_closes ? comp.reg_closes+"T00:00:00" : "2025-08-15T00:00:00");

  // Load competition data
  useEffect(() => {
    fetch(API+"/api/competition/current").then(r=>r.json()).then(d=>{
      setComp(d.competition||null);
      setLeaderboard((d.leaderboard||[]).map((p,i)=>({...p,rank:i+1,color:avatarColor(p.name||"U")})));
      setLastUpdate(new Date());
    }).catch(()=>{}).finally(()=>setCompLoading(false));
  }, []);

  // Poll leaderboard every 30s
  useEffect(() => {
    const id = setInterval(() => {
      fetch(API+"/api/competition/current").then(r=>r.json()).then(d=>{
        setLeaderboard((d.leaderboard||[]).map((p,i)=>({...p,rank:i+1,color:avatarColor(p.name||"U")})));
        setLastUpdate(new Date());
      }).catch(()=>{});
    }, 30000);
    return () => clearInterval(id);
  }, []);

  // My status
  useEffect(() => {
    if (!authToken) return;
    fetch(API+"/api/competition/my-status",{headers:{Authorization:"Bearer "+authToken}}).then(r=>r.json()).then(d=>setMyStatus(d)).catch(()=>{});
    // Pre-fill email from user
    if (authUser?.email) setForm(f=>({...f,email:authUser.email, name:authUser.name||""}));
  }, [authToken, authUser]);

  const checkReferral = (code) => {
    if (!code.trim()) { setRefStatus(null); return; }
    fetch(API+"/api/competition/validate-referral/"+code.trim().toUpperCase())
      .then(r=>r.json()).then(d=>setRefStatus(d.valid?"valid":"invalid")).catch(()=>setRefStatus("invalid"));
  };

  const fee = refStatus === "valid" ? (comp?.discounted_fee||34) : (comp?.entry_fee||39);

  const submit = async () => {
    if (!form.name || !form.email || !form.accountName) { toast("⚠️ Fill all required fields"); return; }
    if (refStatus === "invalid") { toast("❌ Invalid referral code"); return; }
    if (!authToken) { toast("🔑 Login first to register"); return; }
    setSubmitting(true);
    try {
      const r = await fetch(API+"/api/competition/register",{
        method:"POST",
        headers:{Authorization:"Bearer "+authToken,"Content-Type":"application/json"},
        body:JSON.stringify({realName:form.name,accountName:form.accountName,email:form.email,phone:form.phone,referralCode:form.referral||null})
      });
      const d = await r.json();
      if (r.ok || r.status===409) {
        if (r.status===409 && d.registration?.payment_status==="paid") {
          toast("✅ You're already registered!");
          setMyStatus({registered:true,registration:d.registration});
        } else {
          toast(`💳 Registration saved! Pay ₹${fee} to confirm. Redirecting to payment…`);
          setTimeout(()=>toast("📧 Check your email for payment link."),2000);
          setMyStatus({registered:true,registration:d.registration});
        }
      } else {
        toast("❌ "+(d.message||"Failed"));
      }
    } catch(e) { toast("❌ Network error"); }
    setSubmitting(false);
  };

  const isEnded = comp?.status === "ended";
  const isActive = comp?.status === "active";
  const isUpcoming = comp?.status === "upcoming" || !comp;

  return (
    <div className="fade">

        <div style={{fontSize:52,marginBottom:8}}>🏆</div>
        <div style={{color:"#fff",fontWeight:900,fontSize:"clamp(22px,5vw,36px)",lineHeight:1.1,marginBottom:4}}>{comp?.name?.split(" ").slice(0,2).join(" ")||"BADHEGA INDIA"}</div>
        <div style={{color:"var(--gd)",fontWeight:900,fontSize:"clamp(18px,4vw,28px)"}}>{comp?.name?.split(" ").slice(2).join(" ")||"REEL COMPETITION"}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.8)",marginTop:8,fontWeight:600}}>🏆 Views (1pt each) + Likes (2pts each) = Final Score</div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginTop:14}}>
          <span style={{background:"var(--gd)",color:"#000",fontWeight:900,fontSize:16,padding:"6px 20px",borderRadius:"var(--r)"}}>🏆 {comp?.prize||"₹5,000"} Prize</span>
          <span style={{background:"rgba(255,255,255,.18)",color:"#fff",fontWeight:700,fontSize:13,padding:"6px 16px",borderRadius:"var(--r)"}}>
            {isEnded?"🏁 Competition Ended":isActive?"🔥 Active Now":isUpcoming?"📅 Coming Soon":""}
            {" "}· 👥 {comp?.registeredCount||0} registered
          </span>
        </div>
        {!isEnded && (
          <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:12}}>
            {[{v:cd.d,l:"D"},{v:cd.h,l:"H"},{v:cd.m,l:"M"},{v:cd.s,l:"S"}].map(({v,l})=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{background:"rgba(0,0,0,.42)",color:"#fff",fontWeight:900,fontSize:16,minWidth:38,borderRadius:8,padding:"4px 8px",fontFamily:"monospace"}}>{pad(v)}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,.7)",fontWeight:700,marginTop:2}}>{l}</div>
              </div>

      : <svg style={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>;
    if (id==="inbox") return active
      ? <svg style={s} viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      : <svg style={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
    if (id==="profile") return active
      ? <svg style={s} viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      : <svg style={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    return null;
  };

  const items = [
    {id:"home",  label:"Home"},
    {id:"reels", label:"Reels"},
    {id:"create",label:"",  special:true},
    {id:"inbox", label:"Chat", badge:unread},
    {id:"profile",label:"Me"},
  ];

  return (
    <div className="mob-nav">
      {items.map(({id,label,special,badge})=>(
        <button key={id} className={`mob-btn${page===id?" on":""}`} onClick={()=>special?onPlusClick():onNav(id)}>
          {special ? (
            <div style={{width:46,height:46,borderRadius:"50%",background:"var(--ac)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 12px rgba(29,155,240,.45)"}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
          ) : (
            <>
              <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <NavIcon id={id} active={page===id}/>
                {badge>0 && <span className="nav-badge" style={{top:-4,right:-6,minWidth:17,height:17,fontSize:10}}>{badge>9?"9+":badge}</span>}
              </div>
              <span className="mob-label" style={{fontWeight:page===id?700:500,fontSize:10,letterSpacing:.2}}>{label}</span>
            </>
          )}
        </button>
      ))}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

// ─── GOOGLE SIGN-IN ────────────────────────────────────────────────────────────
const GoogleBtn = ({ onLogin, toast, onClose }) => {
  const ref = useRef(null);
  useEffect(()=>{
    const init=()=>{
      if(!window.google||!ref.current)return;
      window.google.accounts.id.initialize({client_id:"821038769218-dh1m60mng4c3qkbmv44a8dkfabsldq0n.apps.googleusercontent.com",callback:async r=>{
        try{const res=await fetch(API+"/api/auth/google",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({credential:r.credential})});const d=await res.json();if(res.ok){onLogin(d.user,d.token);toast("🎉 Welcome!");onClose();}else toast("❌ "+(d.message||"Google login failed"));}catch{toast("❌ Google login failed");}
      },auto_select:false});
      window.google.accounts.id.renderButton(ref.current,{theme:"outline",size:"large",width:ref.current.offsetWidth||360,text:"continue_with",shape:"pill"});
    };
    if(window.google){init();return;}
    const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";s.async=true;s.defer=true;s.onload=init;document.head.appendChild(s);
  },[]);
  return <div ref={ref} style={{width:"100%",minHeight:44}}/>;
};

// ─── AUTH MODAL ────────────────────────────────────────────────────────────────
const AuthModal = ({ mode, onClose, onLogin, toast, onSwitch }) => {
  const [email,setEmail]=useState("");const [pass,setPass]=useState("");const [name,setName]=useState("");const [loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!email||!pass||(mode==="register"&&!name)){toast("⚠️ Fill all fields");return;}
    setLoading(true);
    try{
      const r=await fetch(API+(mode==="login"?"/api/auth/login":"/api/auth/register"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(mode==="login"?{email,password:pass}:{name,email,password:pass})});
      const d=await r.json();
      if(r.ok){onLogin(d.user,d.token);toast(mode==="login"?"👋 Welcome back!":"🎉 Account created!");onClose();}
      else toast("❌ "+(d.message||(mode==="login"?"Login failed":"Registration failed")));
    }catch{toast("❌ Network error");}finally{setLoading(false);}
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 16px"}}>
      <div style={{width:"100%",maxWidth:420,background:"#fff",borderRadius:24,padding:"28px 28px 24px",animation:"fadeIn .2s ease",maxHeight:"90dvh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:22}}>{mode==="login"?"Sign in":"Create account"}</div>
          <button onClick={onClose} style={{width:34,height:34,borderRadius:"50%",border:"1px solid var(--br)",background:"transparent",cursor:"pointer",fontSize:18,color:"var(--t2)"}}>✕</button>
        </div>
        <GoogleBtn onLogin={onLogin} toast={toast} onClose={onClose}/>
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}>
          <div style={{flex:1,height:1,background:"var(--br)"}}/>
          <span style={{fontSize:13,color:"var(--t2)"}}>or email</span>
          <div style={{flex:1,height:1,background:"var(--br)"}}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {mode==="register"&&<div><label className="lbl">Full Name</label><input className="inp" type="text" placeholder="e.g. Rahul Sharma" value={name} onChange={e=>setName(e.target.value)}/></div>}
          <div><label className="lbl">Email</label><input className="inp" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
          <div><label className="lbl">Password</label><input className="inp" type="password" placeholder="Enter password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
          <button className="btn-a" style={{padding:14,fontSize:16,fontWeight:800,opacity:loading?.6:1}} onClick={submit} disabled={loading}>{loading?"Please wait…":(mode==="login"?"Sign in":"Create account")}</button>
          <div style={{textAlign:"center",fontSize:14,color:"var(--t2)"}}>{mode==="login"?"Don't have an account? ":"Already have an account? "}<button onClick={()=>onSwitch(mode==="login"?"register":"login")} style={{background:"none",border:"none",cursor:"pointer",color:"var(--ac)",fontWeight:700,fontSize:14}}>{mode==="login"?"Sign up":"Sign in"}</button></div>
        </div>
      </div>
    </div>
  );
};

// ─── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [ads, setAds] = useState([]);
  const [reels, setReels] = useState([]);
  const [savedIds, setSavedIds] = useState([]);
  const [adsLoading, setAdsLoading] = useState(true);
  const [reelsOpen, setReelsOpen] = useState(false);
  const [reelStart, setReelStart] = useState(0);
  const [chatOpen, setChatOpen] = useState(false);
  const [chatTarget, setChatTarget] = useState(null);
  const [commentsTarget, setCommentsTarget] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);
  const [toastTimer, setToastTimer] = useState(null);
  const [adDetailId, setAdDetailId] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [plusMenuOpen, setPlusMenuOpen] = useState(false);
  const [shareAdModal, setShareAdModal] = useState(null);
  const [authMode, setAuthMode] = useState(null);
  const [authUser, setAuthUser] = useState(()=>getUser());
  const [authToken, setAuthToken] = useState(()=>getToken());
  const [unreadCount, setUnreadCount] = useState(0);
  const [customComps, setCustomComps] = useState([]);

  const swipeContainerRef = useRef(null);

  const toast = useCallback((msg) => {
    setToastMsg(msg);
    clearTimeout(toastTimer);
    const t = setTimeout(() => setToastMsg(null), 2500);
    setToastTimer(t);
  }, []);

  const doLogin = (user, token) => {
    localStorage.setItem("ds_token", token);
    localStorage.setItem("ds_user", JSON.stringify(user));
    setAuthUser(user); setAuthToken(token);
  };
  const doLogout = () => {
    localStorage.removeItem("ds_token"); localStorage.removeItem("ds_user");
    setAuthUser(null); setAuthToken(null); toast("👋 Logged out");
  };

  // Load all ads (all 54)
  const loadAds = useCallback(async (params={}) => {
    try {
      setAdsLoading(true);
      const qp = new URLSearchParams({page:1,limit:100,sort:"newest",...params});
      const res = await fetch(API+"/api/ads?"+qp);
      const data = await res.json();
      const raw = data.ads||data.data||(Array.isArray(data)?data:[]);
      setAds(raw.map(a=>normAd(a,savedIds)));
    } catch(e){console.error(e);}
    finally{setAdsLoading(false);}
  }, [savedIds]);

  // Load all reels (ads + competition reels combined)
  const loadReels = useCallback(async () => {
    try {
      const res = await fetch(API+"/api/reels?limit=50");
      const data = await res.json();
      const raw = data.reels||data.data||(Array.isArray(data)?data:[]);
      if (raw.length>0) setReels(raw.map(normReel));
    } catch(e){console.error("reels error",e);}
  }, []);

  // Load saved ad IDs
  const loadSaved = useCallback(async () => {
    if (!authToken) return;
    try {
      const res = await fetch(API+"/api/ads/saved/me",{headers:{Authorization:"Bearer "+authToken}});
      const data = await res.json();
      const list = data.ads||(Array.isArray(data)?data:[]);
      setSavedIds(list.map(a=>a._id||a.id).filter(Boolean));
    } catch {}
  }, [authToken]);

  // Load unread count
  const loadUnread = useCallback(async () => {
    if (!authToken) return;
    try {
      const res = await fetch(API+"/api/chat/unread",{headers:{Authorization:"Bearer "+authToken}});
      const data = await res.json();
      setUnreadCount(data.count||data.unread||0);
    } catch {}
  }, [authToken]);

  // Load custom competitions from backend (visible to all users)
  const loadCustomComps = useCallback(async () => {
    try {
      const res = await fetch(API+"/api/competitions/custom");
      const data = await res.json();
      setCustomComps(Array.isArray(data) ? data : (data.competitions||[]));
    } catch(e){ console.error("customComps error",e); }
  }, []);

  useEffect(()=>{ loadAds(); loadReels(); loadCustomComps(); }, []);
  useEffect(()=>{ if(authToken){loadSaved();loadUnread();} }, [authToken]);
  useEffect(()=>{ setAds(p=>p.map(a=>({...a,saved:savedIds.includes(a.id)}))); }, [savedIds]);

  const handleSave = useCallback(async id => {
    if (!authToken){toast("🔑 Login to save");setAuthMode("login");return;}
    const isSaved = savedIds.includes(id);
    setSavedIds(p=>isSaved?p.filter(x=>x!==id):[...p,id]);
    toast(isSaved?"Removed":"🔖 Saved!");
    fetch(API+"/api/ads/"+id+"/save",{method:"POST",headers:{Authorization:"Bearer "+authToken}}).catch(()=>{});
  }, [authToken, savedIds]);

  const handleLike = useCallback(id => {
    if (!authToken){toast("🔑 Login to like");return;}
    setAds(p=>p.map(a=>a.id===id?{...a,liked:!a.liked}:a));
  }, [authToken]);

  const deleteAd = useCallback(async id => {
    if (!authToken) return;
    try{const r=await fetch(API+"/api/ads/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+authToken}});if(r.ok)setAds(p=>p.filter(a=>a.id!==id));}catch{}
  }, [authToken]);

  const submitAd = useCallback(async fd => {
    if (!authToken){setAuthMode("login");return false;}
    try{
      const r=await fetch(API+"/api/ads",{method:"POST",headers:{Authorization:"Bearer "+authToken,"Content-Type":"application/json"},body:JSON.stringify(fd)});
      if(r.ok){toast("✅ Ad posted!");loadAds();return true;}
      else{const d=await r.json();toast("❌ "+(d.message||"Failed"));return false;}
    }catch{toast("❌ Network error");return false;}
  }, [authToken, loadAds]);

  const onNav = (p, id=null) => {
    if (p==="reels") { setReelsOpen(true); setReelStart(0); return; }
    setAdDetailId(id);
    setPage(p);
    if(p!=="home") { setReelsOpen(false); setChatOpen(false); }
  };

  const openChat = (target=null) => { setChatTarget(target); setChatOpen(true); };
  const openComments = target => setCommentsTarget(target);
  const openReels = (idx=0) => { setReelStart(idx); setReelsOpen(true); };
  const currentAd = ads.find(a=>a.id===adDetailId);

  // Swipe-to-reels on home
  useEffect(() => {
    const el = swipeContainerRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting && e.target.dataset.slot==="reels") { setReelsOpen(true); setReelStart(0); el.scrollTo({left:0,behavior:"instant"}); } });
    }, {root:el,threshold:0.6});
    el.querySelectorAll("[data-slot]").forEach(s=>obs.observe(s));
    return()=>obs.disconnect();
  }, [page]);

  const plusItems = [
    {icon:"📸",title:"Post Reel",desc:"Share a video reel",color:"linear-gradient(135deg,#f91880,#7c3aed)",action:()=>{setPlusMenuOpen(false);onNav("create-post");}},
    {icon:"🏷️",title:"Post Ad",desc:"Sell something",color:"linear-gradient(135deg,#00ba7c,#0891b2)",action:()=>{setPlusMenuOpen(false);onNav("create-ad");}},
  ];

  return (
    <>
      <style>{CSS}</style>
      {authMode&&<AuthModal mode={authMode} onClose={()=>setAuthMode(null)} onLogin={doLogin} toast={toast} onSwitch={m=>setAuthMode(m)}/>}
      {shareAdModal&&<ShareModal onClose={()=>setShareAdModal(null)} url={"https://dealsara.com/ad/"+shareAdModal.id} reel={null}/>}
      {reelsOpen&&<ReelsView reels={reels} setReels={setReels} startIdx={reelStart} onClose={()=>setReelsOpen(false)} onComment={openComments} toast={toast} authToken={authToken}/>}
      {chatOpen&&<ChatPage onBack={()=>setChatOpen(false)} target={chatTarget} authToken={authToken}/>}
      {commentsTarget&&<CommentsPanel target={commentsTarget} onClose={()=>setCommentsTarget(null)} toast={toast} authToken={authToken}/>}
      {toastMsg&&<Toast msg={toastMsg}/>}
      {searchOpen&&<SearchPage onBack={()=>setSearchOpen(false)} toast={toast} ads={ads} reels={reels} onNav={onNav} onOpenReels={openReels}/>}
      {plusMenuOpen&&(
        <BottomSheet onClose={()=>setPlusMenuOpen(false)} bg="#fff" light maxH="auto">
          <div>
            <div style={{fontWeight:800,fontSize:18,padding:"4px 16px 14px",textAlign:"center",color:"#0f1419"}}>Create</div>
            {plusItems.map(item=>(
              <button key={item.title} className="plus-menu-item" onClick={item.action}>
                <div className="plus-icon" style={{background:item.color}}>{item.icon}</div>
                <div><div style={{fontWeight:700,fontSize:16,color:"#0f1419"}}>{item.title}</div><div style={{fontSize:13,color:"var(--t2)"}}>{item.desc}</div></div>
                <svg style={{marginLeft:"auto",flexShrink:0}} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            ))}
            <div style={{padding:"8px 8px 24px"}}><button onClick={()=>setPlusMenuOpen(false)} style={{width:"100%",padding:13,borderRadius:14,border:"1px solid var(--br)",background:"var(--el)",fontWeight:700,fontSize:15,cursor:"pointer",color:"var(--t2)"}}>Cancel</button></div>
          </div>
        </BottomSheet>
      )}
      {!reelsOpen&&!chatOpen&&!searchOpen&&(
        <div className="root">
          <LeftSidebar page={page} onNav={onNav} toast={toast} unread={unreadCount} authUser={authUser} onLogout={doLogout} onLogin={()=>setAuthMode("login")}/>
          {page==="home"?(
            <div ref={swipeContainerRef} style={{flex:1,maxWidth:600,display:"flex",overflowX:"scroll",scrollSnapType:"x mandatory",scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
              <div data-slot="home" style={{minWidth:"100%",scrollSnapAlign:"start",borderLeft:"1px solid #eff3f4",borderRight:"1px solid #eff3f4",minHeight:"100dvh",background:"#fff",overflowY:"auto"}}>
                <HomePage ads={ads} setAds={setAds} reels={reels} onNav={onNav} onOpenReels={openReels} onComment={openComments} toast={toast} onSearch={()=>setSearchOpen(true)} onShareAd={id=>setShareAdModal(ads.find(a=>a.id===id)||null)} onLikeAd={handleLike} onSaveAd={handleSave} loading={adsLoading} loadAds={loadAds} customComps={customComps}/>
              </div>
              <div data-slot="reels" style={{minWidth:"100%",scrollSnapAlign:"start",background:"#000",minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="rgba(255,255,255,.3)" stroke="none"/></svg>
                <span style={{color:"rgba(255,255,255,.3)",fontWeight:700,fontSize:16,letterSpacing:1}}>REELS</span>
              </div>
            </div>
          ):(
            <main className="feed">
              {page==="dashboard"&&<DashboardPage ads={ads} setAds={setAds} onNav={onNav} onChat={openChat} toast={toast} authUser={authUser} authToken={authToken} savedAdIds={savedIds} deleteAd={deleteAd} onLogin={()=>setAuthMode("login")}/>}
              {page==="profile"&&<ProfilePage ads={ads} onNav={onNav} toast={toast} authUser={authUser} authToken={authToken} onLogout={doLogout} onLogin={()=>setAuthMode("login")}/>}
              {page==="inbox"&&<InboxPage onChat={openChat} authToken={authToken}/>}
              {page==="competition"&&<CompetitionPage toast={toast} authToken={authToken} authUser={authUser}/>}
              {page==="create"&&<CreatePage onNav={onNav} toast={toast} authUser={authUser} authToken={authToken}/>}
              {page==="create-post"&&<PostSubPage onBack={()=>setPage("home")} toast={toast} onNav={onNav} authUser={authUser} authToken={authToken}/>}
              {page==="create-ad"&&<PostAdSubPage onBack={()=>setPage("home")} toast={toast} onNav={onNav} authToken={authToken}/>}
              {page==="admin"&&<AdminPage toast={toast} authUser={authUser} authToken={authToken} customComps={customComps} setCustomComps={setCustomComps}/>}
              {page==="ad-detail"&&currentAd&&<AdDetail ad={currentAd} onBack={()=>setPage("home")} onChat={ad=>openChat(ad)} toast={toast} onSave={handleSave} savedAdIds={savedIds}/>}
            </main>
          )}
          <RightSidebar onNav={onNav} toast={toast} onSearch={()=>setSearchOpen(true)} authToken={authToken}/>
        </div>
      )}
      {!reelsOpen&&!chatOpen&&!searchOpen&&(
        <MobileNav page={page} onNav={onNav} unread={unreadCount} onPlusClick={()=>setPlusMenuOpen(p=>!p)}/>
      )}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
